<script>
function encodeState(obj) {
  const compressed = btoa(encodeURIComponent(JSON.stringify(obj)));
  window.location.hash = compressed;
  return compressed;
}

function decodeState() {
  try {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    return JSON.parse(decodeURIComponent(atob(hash)));
  } catch(e) { return null; }
}

function calculate() {
  const agent_type = document.getElementById('agent_type').value || "Payment Agent (processes transactions)";
  const jurisdictions = document.getElementById('jurisdictions').value || "US + EU";
  const kyc = document.getElementById('kyc').value || "Automated screening + manual review";
  const screening_list = document.getElementById('screening_list').value || "OFAC only";
  const frequency = document.getElementById('frequency').value || "Onboarding only";
  const audit_trail = document.getElementById('audit_trail').value || "Basic logs";
  const fallback = document.getElementById('fallback').value || "Manual review by compliance team";
  const x402 = document.getElementById('x402').value || "Not implemented";
  
  // Encode inputs for sharing
  const inputState = {};
  inputState['agent_type'] = agent_type;
  inputState['jurisdictions'] = jurisdictions;
  inputState['kyc'] = kyc;
  inputState['screening_list'] = screening_list;
  inputState['frequency'] = frequency;
  inputState['audit_trail'] = audit_trail;
  inputState['fallback'] = fallback;
  inputState['x402'] = x402;
  encodeState({inputs: inputState});
  

  const scoreMap = {
    'agent_type': {'Payment Agent (processes transactions)': 50, 'Data Agent (scrapes/searches)': 20, 'Trading Agent (executes trades)': 60, 'Content Agent (generates content)': 10, 'Customer Support Agent': 15},
    'jurisdictions': {'US only': 60, 'US + EU': 75, 'Global including sanctioned countries': 100, 'Unsure': 10},
    'kyc': {'None': 0, 'Manual review only': 30, 'Automated screening + manual review': 70, 'Full automated KYC/KYB + ongoing monitoring': 100},
    'screening_list': {'None': 0, 'OFAC only': 40, 'OFAC + EU + UN': 75, 'OFAC + EU + UN + UK + country-specific': 100},
    'frequency': {'Never': 0, 'On onboarding only': 25, 'Onboarding + periodic (monthly)': 65, 'Real-time at transaction + ongoing monitoring': 100},
    'audit_trail': {'None': 0, 'Basic logs': 35, 'Structured logs + retention policy': 70, 'Immutable audit trail + automated reporting': 100},
    'fallback': {'No process defined': 0, 'Manual review by compliance team': 40, 'Automated flag + manual review': 70, 'Automated block + alert + manual review workflow': 100},
    'x402': {'Not implemented': 0, 'Planned': 20, 'Partial implementation': 50, 'Full X402 with verifiable payment': 100}
  };
  const riskMap = {
    'agent_type': {'Payment Agent (processes transactions)': 90, 'Data Agent (scrapes/searches)': 40, 'Trading Agent (executes trades)': 100, 'Content Agent (generates content)': 20, 'Customer Support Agent': 30}
  };
  
  const answers = {agent_type, jurisdictions, kyc, screening_list, frequency, audit_trail, fallback, x402};
  let total = 0;
  for (const [k, v] of Object.entries(answers)) {
    total += (scoreMap[k] || {})[v] || 0;
  }
  const score = Math.round(total / Object.keys(answers).length);
  const risk_level = (riskMap['agent_type'] || {})[agent_type] || 50;
  
  const tier = score >= 80 ? '🟢 Compliance Ready' : score >= 55 ? '🟡 Needs Improvement' : score >= 30 ? '🟠 Significant Gaps' : '🔴 High Compliance Risk';
  
  const gaps = Object.entries(answers).filter(([k, v]) => ((scoreMap[k] || {})[v] || 0) < 50).map(([k]) => k);
  
  return {
    score: score,
    tier: tier,
    agent_risk_level: risk_level,
    gaps: gaps,
    key_action: gaps.length === 0 ? 'Maintain current controls and monitor regulatory changes' : gaps.includes('x402') ? 'Implement X402 protocol for verifiable agent payments' : 'Address: ' + gaps.slice(0, 3).join(', ')
  };

  
  displayResults(result);
  document.getElementById('result-card').classList.add('show');
  document.getElementById('result-card').scrollIntoView({behavior:'smooth'});
}

function displayResults(r) {
  if (r.error) {
    document.getElementById('result-content').innerHTML = '<div class="verdict" style="color:#f87171">' + r.error + '</div>';
    return;
  }
  
  let html = '';
  
  // Score circle if present
  const scoreVal = r.score || r.risk_score || r.overall;
  if (scoreVal !== undefined) {
    const scoreClass = scoreVal >= 80 ? 'score-high' : scoreVal >= 50 ? 'score-mid' : 'score-low';
    const scoreLabel = r.score !== undefined ? 'SCORE' : r.risk_score !== undefined ? 'RISK' : 'RATING';
    html += '<div class="score-circle ' + scoreClass + '">' + scoreVal + '<span class="label">' + scoreLabel + '</span></div>';
  }
  
  // Verdict
  if (r.verdict || r.tier) {
    html += '<div class="verdict">' + (r.verdict || r.tier) + '</div>';
  }
  
  // Key metrics
  html += '<div class="metrics">';
  const skipKeys = ['score', 'risk_score', 'verdict', 'tier', 'error', 'providers', 'scenarios', 'alternatives', 'dimensions', 'recommendations', 'red_flags', 'recommendation', 'gaps', 'key_action', 'username', 'disclaimer', 'note', 'method', 'type', 'agent_risk_level', 'cheapest', 'savings_vs_most_expensive'];
  
  // Show key numeric/string results
  for (const [k, v] of Object.entries(r)) {
    if (skipKeys.includes(k)) continue;
    if (typeof v === 'object' || Array.isArray(v)) continue;
    const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    html += '<div class="metric"><div class="val">' + v + '</div><div class="lbl">' + label + '</div></div>';
  }
  
  // Provider table for cost calculators
  if (r.providers) {
    html += '</div><div style="margin-top:1rem">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem">';
    html += '<tr style="color:#64748b;text-align:left"><th style="padding:0.5rem">Provider</th><th style="padding:0.5rem;text-align:right">Monthly</th><th style="padding:0.5rem;text-align:right">Annual</th></tr>';
    for (const p of r.providers) {
      html += '<tr style="border-top:1px solid #1e293b"><td style="padding:0.5rem;color:#e2e8f0">' + p.name + '</td><td style="padding:0.5rem;text-align:right;font-weight:600;color:#60a5fa">' + p.monthly + '</td><td style="padding:0.5rem;text-align:right;color:#94a3b8">' + p.annual + '</td></tr>';
    }
    html += '</table>';
  }
  
  // Scenarios table
  if (r.scenarios) {
    html += '</div><div style="margin-top:1rem">';
    for (const s of r.scenarios) {
      html += '<div class="metric"><div class="val">$' + Number(s.proceeds).toLocaleString() + '</div><div class="lbl">' + s.label + '</div></div>';
    }
  }
  
  // Alternatives
  if (r.alternatives) {
    html += '</div><div style="margin-top:1rem">';
    for (const a of r.alternatives) {
      html += '<div class="metric"><div class="val">$' + Number(a.cost).toLocaleString() + '</div><div class="lbl">' + a.shop + '</div></div>';
    }
  }
  
  html += '</div>';
  
  // Recommendations
  if (r.recommendations && r.recommendations.length > 0) {
    html += '<div class="recommendations"><h3>💡 Recommendations</h3><ul>';
    for (const rec of r.recommendations) {
      html += '<li>' + rec + '</li>';
    }
    html += '</ul></div>';
  } else if (r.recommendation) {
    html += '<div class="recommendations"><h3>💡 Recommendation</h3><p style="color:#cbd5e1;font-size:0.9rem">' + r.recommendation + '</p></div>';
  }
  
  // Red flags
  if (r.red_flags && r.red_flags.length > 0) {
    html += '<div class="recommendations" style="border:1px solid #7f1d1d"><h3 style="color:#f87171">🚩 Red Flags</h3><ul>';
    for (const f of r.red_flags) {
      html += '<li style="color:#fca5a5">' + f + '</li>';
    }
    html += '</ul></div>';
  }
  
  // Gaps
  if (r.gaps && r.gaps.length > 0) {
    html += '<div class="recommendations"><h3>⚠️ Gaps to Address</h3><ul>';
    for (const g of r.gaps) {
      html += '<li>' + g.replace(/_/g, ' ') + '</li>';
    }
    html += '</ul></div>';
  }
  
  document.getElementById('result-content').innerHTML = html;
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    btn.style.background = '#14532d';
    btn.style.borderColor = '#22c55e';
    setTimeout(() => { btn.textContent = orig; btn.style.background = '#1e3a5f'; btn.style.borderColor = '#3b82f6'; }, 2000);
  });
}

function shareTwitter() {
  const text = encodeURIComponent(document.title + ' — Check your score:');
  const url = encodeURIComponent(window.location.href);
  window.open('https://x.com/intent/tweet?text=' + text + '&url=' + url, '_blank');
}

function shareLinkedIn() {
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title);
  window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + url, '_blank');
}

// Range input live updates
document.querySelectorAll('.input-range').forEach(el => {
  el.addEventListener('input', function() {
    const valSpan = document.getElementById(this.id + '-val');
    if (valSpan) {
      const unit = valSpan.textContent.replace(/[0-9.-]/g, '');
      valSpan.textContent = this.value + (unit || '');
    }
  });
});

// Restore state from URL hash on load
window.addEventListener('DOMContentLoaded', function() {
  const state = decodeState();
  if (state && state.inputs) {
    for (const [key, val] of Object.entries(state.inputs)) {
      const el = document.getElementById(key);
      if (el) {
        if (el.type === 'range') {
          el.value = val;
          const vs = document.getElementById(key + '-val');
          if (vs) vs.textContent = val + (vs.textContent.replace(/[0-9.-]/g, '') || '');
        } else {
          el.value = val;
        }
      }
    }
    // Auto-calculate on page load with shared state
    calculate();
  }
});
</script>
